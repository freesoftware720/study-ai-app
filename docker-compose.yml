version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: study-ai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: study-ai-app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: study-ai-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/study-ai-app
      - JWT_SECRET=your_jwt_secret_key_here
      - OPENAI_API_KEY=your_openai_api_key_here
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongodb_data:
